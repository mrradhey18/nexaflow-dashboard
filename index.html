<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaFlow Dashboard</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-app: #0b0d14;
      --bg-card: #111520;
      --bg-card2: #181d2c;
      --bg-glass: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-hi: rgba(99, 102, 241, 0.5);
      --text-1: #eef2ff;
      --text-2: #7c8898;
      --text-3: #3d4659;
      --indigo: #6366f1;
      --indigo-hi: #a5b4fc;
      --indigo-lo: rgba(99, 102, 241, 0.14);
      --emerald: rgba(16, 185, 129, 1);
      --amber: rgba(245, 158, 11, 1);
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --r1: 7px;
      --r2: 13px;
      --trans: 0.17s cubic-bezier(.4, 0, .2, 1);
      --sidebar-w: 215px;
    }

    [data-theme="light"] {
      --bg-app: #f0f4ff;
      --bg-card: #ffffff;
      --bg-card2: #f6f8ff;
      --bg-glass: rgba(0, 0, 0, 0.025);
      --border: rgba(0, 0, 0, 0.09);
      --border-hi: rgba(99, 102, 241, 0.4);
      --text-1: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --indigo-lo: rgba(99, 102, 241, 0.09);
    }

    html,
    body {
      /* overflow: hidden; extra added from claude */
      height: 100%;
      font-family: var(--font);
      background: var(--bg-app);
      color: var(--text-1);
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width var(--trans);
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 58px;
    }

    .sb-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 19px 15px;
      border-bottom: 1px solid var(--border);
      min-height: 64px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      background: transparent;
    }

    .logo-mark img {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 9px;
      display: block;
    }

    .logo-text {
      overflow: hidden;
      white-space: nowrap;
      transition: opacity var(--trans);
    }

    .logo-name {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-1);
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-2);
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-lbl,
    .sidebar.collapsed .user-info {
      opacity: 0;
      width: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r1);
      cursor: pointer;
      color: var(--text-2);
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
      transition: background var(--trans), color var(--trans);
    }

    .nav-item:hover {
      background: var(--bg-glass);
      color: var(--text-1);
    }

    .nav-item.active {
      background: var(--indigo-lo);
      color: var(--indigo-hi);
    }

    .nav-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .sb-bottom {
      padding: 10px 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: var(--r1);
    }

    .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
    }

    .av-sm {
      width: 28px;
      height: 28px;
      font-size: 11px;
    }

    .av-md {
      width: 38px;
      height: 38px;
      font-size: 14px;
    }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap;
    }

    .user-role-lbl {
      font-size: 10.5px;
      color: var(--text-2);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .tb-title {
      font-size: 16px;
      font-weight: 600;
    }

    .tb-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 1px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r1);
      border: 1px solid var(--border);
      background: var(--bg-card2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      font-size: 16px;
      transition: all var(--trans);
      font-family: var(--font);
      flex-shrink: 0;
      position: relative;
    }

    .icon-btn:hover {
      color: var(--text-1);
      border-color: var(--border-hi);
      background: var(--indigo-lo);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 20px;
      overflow: hidden;
    }

    .card-sm {
      padding: 16px;
    }

    .card-lbl {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      margin-bottom: 5px;
    }

    .card-val {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.1;
    }

    .card-sub {
      font-size: 11.5px;
      color: var(--text-2);
      margin-top: 4px;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .grid5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .grid-main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 18px;
    }

    .grid-main-wide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .col-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 11px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10.5px;
      font-weight: 500;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: var(--r1);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      border: none;
      font-family: var(--font);
    }

    .btn-primary {
      background: #6366f1;
      color: #fff;
    }

    .btn-primary:hover {
      background: #4f46e5;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      color: var(--text-1);
      border-color: var(--border-hi);
      background: var(--indigo-lo);
    }

    .btn-danger {
      background: rgba(244, 63, 94, .12);
      color: #fb7185;
      border: 1px solid rgba(244, 63, 94, .25);
    }

    .btn-danger:hover {
      background: rgba(244, 63, 94, .2);
    }

    .btn-success {
      background: rgba(16, 185, 129, .12);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, .25);
    }

    .btn-success:hover {
      background: rgba(16, 185, 129, .2);
    }

    .btn-warning {
      background: rgba(245, 158, 11, .12);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, .25);
    }

    .btn-warning:hover {
      background: rgba(245, 158, 11, .2);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12.5px;
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
    }

    .sa-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .sec-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .sec-title {
      font-size: 13.5px;
      font-weight: 600;
    }

    .tl {
      display: flex;
      flex-direction: column;
    }

    .tl-item {
      display: flex;
      gap: 12px;
      padding: 9px 0;
      position: relative;
    }

    .tl-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 34px;
      width: 1px;
      height: calc(100% - 12px);
      background: var(--border);
    }

    .tl-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 2px solid;
    }

    .donut-wrap {
      display: flex;
      justify-content: center;
      margin: 12px 0;
    }

    .ql-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
      width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .ql-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      border-radius: var(--r1);
      border: 1px solid var(--border);
      background: var(--bg-card2);
      cursor: pointer;
      transition: all var(--trans);
      text-decoration: none;
      color: var(--text-1);
      min-width: 0;
      overflow: hidden;
    }

    .ql-item:hover {
      border-color: var(--border-hi);
      background: var(--indigo-lo);
    }

    .ql-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--r1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .prog {
      height: 5px;
      border-radius: 100px;
      background: var(--border);
      overflow: hidden;
      margin-top: 4px;
    }

    .prog-fill {
      height: 100%;
      border-radius: 100px;
      transition: width .7s ease;
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
    }

    .tbl th {
      font-size: 11px;
      color: var(--text-2);
      font-weight: 500;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .tbl td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .tbl tr:last-child td {
      border-bottom: none;
    }

    .input {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--r1);
      padding: 9px 13px;
      font-size: 13.5px;
      color: var(--text-1);
      font-family: var(--font);
      width: 100%;
      outline: none;
      transition: border var(--trans);
    }

    .input:focus {
      border-color: #6366f1;
    }

    .input::placeholder {
      color: var(--text-3);
    }

    .field-lbl {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      margin-bottom: 6px;
      display: block;
    }

    .field-grp {
      margin-bottom: 15px;
    }

    textarea.input {
      resize: vertical;
      min-height: 70px;
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════════════════════════
       SPLIT LOGIN — NEW STYLES
    ═══════════════════════════════════════════════════════════ */

    }

    /* LEFT PANEL */

    .auth-split {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    .auth-left {
      flex: 1;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* animated gradient mesh background */
    .auth-left-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #060b1a 0%, #0d1535 30%, #1a0e3a 60%, #0f0d2e 100%);
      z-index: 0;
    }

    .auth-left-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 1;
    }

    .auth-left-orb-1 {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.35) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation: orbFloat1 8s ease-in-out infinite;
    }

    .auth-left-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      animation: orbFloat2 10s ease-in-out infinite;
    }

    .auth-left-orb-3 {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 12s ease-in-out infinite;
    }

    /* noise texture overlay */
    .auth-left-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      z-index: 2;
      pointer-events: none;
    }

    /* grid lines */
    .auth-left-grid {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .auth-left-content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 440px;
    }

    .auth-left-logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
      animation: slideUpFade 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .auth-left-logo-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.5), 0 8px 24px rgba(99, 102, 241, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .auth-left-logo-mark img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
    }

    .auth-left-logo-text {
      text-align: left;
    }

    .auth-left-logo-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-left-logo-sub {
      font-size: 10px;
      color: rgba(165, 180, 252, 0.6);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .auth-left-heading {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(160deg, #ffffff 0%, #c7d2fe 50%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: slideUpFade 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .auth-left-sub {
      font-size: 15px;
      color: rgba(165, 180, 252, 0.65);
      line-height: 1.6;
      margin-bottom: 44px;
      animation: slideUpFade 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* floating glass cards */
    .auth-float-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideUpFade 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .auth-float-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      text-align: left;
      cursor: default;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .auth-float-card:hover {
      transform: translateX(6px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .auth-float-card:nth-child(1) {
      animation: floatCard1 6s ease-in-out 1s infinite;
    }

    .auth-float-card:nth-child(2) {
      animation: floatCard2 7s ease-in-out 1.5s infinite;
    }

    .auth-float-card:nth-child(3) {
      animation: floatCard3 8s ease-in-out 2s infinite;
    }

    .auth-float-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .auth-float-body {
      flex: 1;
      min-width: 0;
    }

    .auth-float-label {
      font-size: 13.5px;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
    }

    .auth-float-sub {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.75);
      margin-top: 2px;
    }

    .auth-float-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-green {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .badge-blue {
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    .badge-amber {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.25);
    }

    /* brand strip at bottom of left */
    .auth-left-brand {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      font-size: 11px;
      color: rgba(99, 102, 241, 0.4);
      letter-spacing: 0.5px;
    }

    /* RIGHT PANEL */
    /* .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: #080b14;
      position: relative;
      overflow: hidden;
    } */
    .auth-right {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .auth-right::before {
      content: '';
      position: absolute;

      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      gap: 12px;
      position: relative;
      transition: all 0.15s ease;
    }

    .nav-item:hover {
      background: rgba(99, 102, 241, 0.08);
      color: var(--text-1);
      transform: translateX(1px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.18), rgba(139, 92, 246, 0.12));
      color: #a5b4fc;
      box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.2);
    }

    [data-theme="light"] .nav-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(139, 92, 246, 0.08));
      color: #4f46e5;
      box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.15);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: linear-gradient(180deg, #6366f1, #8b5cf6);
      border-radius: 0 3px 3px 0;
    }

    .nav-icon {
      width: 18px;
      text-align: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .nav-icon i {
      width: 18px;
      display: inline-block;
      text-align: center;
    }

    .sb-bottom {
      padding: 10px 10px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    [data-theme="light"] .sb-bottom {
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .user-chip {
      border-radius: 10px;
      padding: 10px 12px;
      transition: background 0.15s ease;
    }

    .user-chip:hover {
      background: rgba(99, 102, 241, 0.06);
    }

    .avatar {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .nav-item i {
      font-size: 14px;
    }
  </style>
</head>

    function genSalesHistory() {

    var SQL_BASE = `-- ① PROFILES
create table profiles (
  id uuid references auth.users primary key,
  full_name text not null,
  avatar_initials text default 'U',
  role text default 'Staff',
  created_at timestamptz default now()
);
alter table profiles enable row level security;
create policy "read"   on profiles for select using (auth.role() = 'authenticated');
create policy "update" on profiles for update using (auth.uid() = id);
create policy "insert" on profiles for insert with check (auth.uid() = id);

-- ② SESSIONS
create table sessions (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references profiles(id) not null,
  type text not null,
  work_date date not null,
  started_at timestamptz not null,
  ended_at timestamptz,
  duration_minutes integer,
  created_at timestamptz default now()
);
alter table sessions enable row level security;
create policy "read"   on sessions for select using (auth.role() = 'authenticated');
create policy "insert" on sessions for insert with check (auth.uid() = user_id);
create policy "update" on sessions for update using (auth.uid() = user_id);
create policy "delete" on sessions for delete using (auth.uid() = user_id);`;

    // ─── DONUT CHART ─────────────────────────────────────────────────────────────
    function Donut(segs) {
      var r = 40, cx = 50, cy = 50, sw = 14, circ = 2 * Math.PI * r;
      var total = segs.reduce(function (a, s) { return a + s.v; }, 0) || 1;
      var ns = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100'); svg.setAttribute('width', '110'); svg.setAttribute('height', '110');
      function ce(attrs) { var c = document.createElementNS(ns, 'circle'); Object.keys(attrs).forEach(function (k) { c.setAttribute(k, attrs[k]); }); return c; }
      svg.appendChild(ce({ cx: cx, cy: cy, r: r, fill: 'none', stroke: 'var(--border)', 'stroke-width': sw }));
      svg.appendChild(ce({ cx: cx, cy: cy, r: r - sw / 2 - 3, fill: 'var(--bg-card2)' }));
      var off = 0;
      segs.forEach(function (s) {
        if (s.v <= 0) return;
        var dash = (s.v / total) * circ;
        svg.appendChild(ce({ cx: cx, cy: cy, r: r, fill: 'none', stroke: s.color, 'stroke-width': sw, 'stroke-dasharray': dash + ' ' + (circ - dash), 'stroke-dashoffset': circ * 0.25 - off, 'stroke-linecap': 'round' }));
        off += dash;
      });
      return svg;
    }

        if (open.type === 'meeting') m += cur; if (open.type === 'call') c += cur; if (open.type === 'focus') f += cur;
      }
      return { work: w, brk: b, meet: m, call: c, focus: f, total: w + b + m + c + f };
    }

      var currentDate = todayStr();

          APP.quoteIndex = Math.floor(Math.random() * QUOTES.length);
          APP.historyDate = null;
          loadAllUserData().then(function () { render(); });

    // ─── BOOT ────────────────────────────────────────────────────────────────────

      document.body.setAttribute('data-theme', APP.theme);
      var msgEl = document.getElementById('load-msg');

        sb = window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } });
      } catch (e) { APP.ready = true; APP.showSetup = true; render(); return; }
      if (msgEl) msgEl.textContent = 'Checking session\u2026';
      try {
        var gs = await sb.auth.getSession();
        var session = gs && gs.data && gs.data.session;
        if (session && session.user) {
          APP.authUser = session.user;
          if (msgEl) msgEl.textContent = 'Loading profile\u2026';
          APP.profile = await loadProfile(session.user.id);
          if (APP.profile) { if (msgEl) msgEl.textContent = 'Syncing your data\u2026'; await loadAllUserData(); }
        }
      } catch (e) { console.error(e); }

        if (event === 'SIGNED_IN' && session && session.user) {
          APP.authUser = session.user;

        return;
      }
      boot();
    });
