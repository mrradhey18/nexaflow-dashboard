<!DOCTYPE html>
<html lang="en">

<title>NexaFlow Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-app:#0b0d14;--bg-card:#111520;--bg-card2:#181d2c;--bg-glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);--border-hi:rgba(99,102,241,0.5);
  --text-1:#eef2ff;--text-2:#7c8898;--text-3:#3d4659;
  --indigo:#6366f1;--indigo-hi:#a5b4fc;--indigo-lo:rgba(99,102,241,0.14);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --r1:7px;--r2:13px;--trans:0.17s cubic-bezier(.4,0,.2,1);--sidebar-w:215px;
}
[data-theme="light"]{--bg-app:#f0f4ff;--bg-card:#ffffff;--bg-card2:#f6f8ff;--bg-glass:rgba(0,0,0,0.025);--border:rgba(0,0,0,0.09);--border-hi:rgba(99,102,241,0.4);--text-1:#0f172a;--text-2:#475569;--text-3:#94a3b8;--indigo-lo:rgba(99,102,241,0.09);}
html,body{height:100%;font-family:var(--font);background:var(--bg-app);color:var(--text-1);}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width var(--trans);overflow:hidden;}
.sidebar.collapsed{width:58px;}
.sb-logo{display:flex;align-items:center;gap:11px;padding:19px 15px;border-bottom:1px solid var(--border);min-height:64px;}
.logo-mark{width:32px;height:32px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.logo-text{overflow:hidden;white-space:nowrap;transition:opacity var(--trans);}
.logo-name{font-size:14.5px;font-weight:600;color:var(--text-1);}
.logo-sub{font-size:10px;color:var(--text-2);}
.sidebar.collapsed .logo-text,.sidebar.collapsed .nav-lbl,.sidebar.collapsed .user-info{opacity:0;width:0;pointer-events:none;overflow:hidden;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r1);cursor:pointer;color:var(--text-2);font-size:13.5px;font-weight:500;white-space:nowrap;border:none;background:none;width:100%;text-align:left;font-family:var(--font);transition:background var(--trans),color var(--trans);}
.nav-item:hover{background:var(--bg-glass);color:var(--text-1);}
.nav-item.active{background:var(--indigo-lo);color:var(--indigo-hi);}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.user-chip{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r1);}
.avatar{display:flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:600;flex-shrink:0;}
.av-sm{width:28px;height:28px;font-size:11px;}.av-md{width:38px;height:38px;font-size:14px;}
.user-name{font-size:13px;font-weight:500;color:var(--text-1);white-space:nowrap;}
.user-role-lbl{font-size:10.5px;color:var(--text-2);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:64px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;}.tb-sub{font-size:11px;color:var(--text-2);margin-top:1px;}
.icon-btn{width:36px;height:36px;border-radius:var(--r1);border:1px solid var(--border);background:var(--bg-card2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:16px;transition:all var(--trans);font-family:var(--font);flex-shrink:0;}
.icon-btn:hover{color:var(--text-1);border-color:var(--border-hi);background:var(--indigo-lo);}
.content{flex:1;overflow-y:auto;padding:24px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;}
.card-sm{padding:16px;}.card-lbl{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:5px;}
.card-val{font-size:26px;font-weight:600;line-height:1.1;}.card-sub{font-size:11.5px;color:var(--text-2);margin-top:4px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.grid-main{display:grid;grid-template-columns:1fr 320px;gap:18px;}
.col-stack{display:flex;flex-direction:column;gap:18px;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:100px;font-size:12px;font-weight:500;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10.5px;font-weight:500;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r1);font-size:13.5px;font-weight:500;cursor:pointer;transition:all var(--trans);border:none;font-family:var(--font);}
.btn-primary{background:#6366f1;color:#fff;}.btn-primary:hover{background:#4f46e5;}
.btn-outline{background:transparent;color:var(--text-2);border:1px solid var(--border);}.btn-outline:hover{color:var(--text-1);border-color:var(--border-hi);background:var(--indigo-lo);}
.btn-danger{background:rgba(244,63,94,.12);color:#fb7185;border:1px solid rgba(244,63,94,.25);}.btn-danger:hover{background:rgba(244,63,94,.2);}
.btn-success{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}.btn-success:hover{background:rgba(16,185,129,.2);}
.btn-sm{padding:6px 12px;font-size:12.5px;}.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.sa-row{display:flex;flex-wrap:wrap;gap:9px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}.sec-title{font-size:13.5px;font-weight:600;}
.tl{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:12px;padding:9px 0;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:16px;top:34px;width:1px;height:calc(100% - 12px);background:var(--border);}
.tl-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid;}
.donut-wrap{display:flex;justify-content:center;margin:12px 0;}
.ql-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--r1);border:1px solid var(--border);background:var(--bg-card2);cursor:pointer;transition:all var(--trans);text-decoration:none;color:var(--text-1);margin-bottom:8px;}
.ql-item:hover{border-color:var(--border-hi);background:var(--indigo-lo);}
.ql-icon{width:34px;height:34px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.prog{height:5px;border-radius:100px;background:var(--border);overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:100px;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;color:var(--text-2);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.input{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--r1);padding:9px 13px;font-size:13.5px;color:var(--text-1);font-family:var(--font);width:100%;outline:none;transition:border var(--trans);}
.input:focus{border-color:#6366f1;}.input::placeholder{color:var(--text-3);}
.field-lbl{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:6px;display:block;}.field-grp{margin-bottom:15px;}
.pie-row{display:flex;align-items:center;margin-bottom:9px;font-size:12.5px;}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:8px;}.pie-name{color:var(--text-2);flex:1;}.pie-val{font-weight:500;font-family:var(--mono);font-size:12px;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-app);}
.auth-card{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:32px;}
.err-msg{font-size:12px;color:#fb7185;margin-top:8px;min-height:18px;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;background:var(--bg-app);}
.loading-screen .spinner{width:32px;height:32px;border-width:3px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--indigo);color:#fff;font-size:11px;font-weight:700;margin-right:8px;flex-shrink:0;}
.sql-block{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--r1);padding:12px;font-family:var(--mono);font-size:11px;color:var(--indigo-hi);white-space:pre;overflow-x:auto;margin-top:6px;line-height:1.6;}
.saved-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);opacity:0;transition:opacity .3s;}
.saved-pill.show{opacity:1;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}.pulse{animation:pulse 2s infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}.fade-up{animation:fadeUp .3s ease both;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@media(max-width:960px){.grid4{grid-template-columns:repeat(2,1fr);}.grid-main{grid-template-columns:1fr;}.sidebar{width:58px;}.sidebar .logo-text,.sidebar .nav-lbl,.sidebar .user-info{opacity:0;width:0;pointer-events:none;}}
@media(max-width:600px){.content{padding:14px;}.grid4{grid-template-columns:1fr 1fr;}.topbar{padding:0 14px;gap:8px;}}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════
// WAIT FOR SUPABASE SDK THEN BOOT
// ══════════════════════════════════════════
function waitForSDK(cb) {
  var attempts = 0;
  function check() {
    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
      cb(null);
    } else if (attempts++ > 150) { // 7.5 seconds max
      cb(new Error('Supabase SDK failed to load'));
    } else {
      setTimeout(check, 50);
    }
  }
  check();
}

// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
var SB_URL = "https://aocugthsqjhhszpzydmb.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvY3VndGhzcWpoaHN6cHp5ZG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDQxNTAsImV4cCI6MjA5MTU4MDE1MH0.1pzaPoTn4PZwz_U06_TaJ_FKMZMq6zvoWRP7JDnE_fI";
var sb = null;

// ══════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════
var APP = {
  ready: false, authUser: null, profile: null,
  theme: localStorage.getItem('nf_theme') || 'dark',
  page: 'dashboard', collapsed: window.innerWidth < 960,
  status: 'checked-out', currentSession: null, timeline: [],
  historyDate: null, saving: false, showSetup: false
};

// ══════════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════════
function mk(tag, cls, style) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (style) Object.assign(e.style, style);
  return e;
}
function dv(cls, style) { return mk('div', cls || '', style); }
function sp(cls) { return mk('span', cls || ''); }
function txt(s) { return document.createTextNode(String(s)); }
function app(parent) {
  for (var i = 1; i < arguments.length; i++) {
    var c = arguments[i];
    if (!c && c !== 0) continue;
    if (typeof c === 'string' || typeof c === 'number') parent.appendChild(txt(c));
    else if (c instanceof Node) parent.appendChild(c);
  }
  return parent;
}
function btn(cls, label, fn, disabled) {
  var b = mk('button', 'btn ' + cls);
  b.textContent = label;
  if (fn) b.addEventListener('click', fn);
  if (disabled) b.disabled = true;
  return b;
}
function inp(cls, type, placeholder, val) {
  var i = mk('input', cls);
  i.type = type || 'text';
  if (placeholder) i.placeholder = placeholder;
  if (val != null) i.value = val;
  return i;
}
function Av(init, sz) {
  return app(dv('avatar av-' + (sz || 'sm')), init || '?');
}
function SBadge(status) {
  var c = SC[status] || SC['checked-out'];
  var b = dv('badge');
  b.style.background = c.bg; b.style.color = c.color;
  var dot = sp(); dot.textContent = c.icon;
  if (status !== 'checked-out') dot.classList.add('pulse');
  return app(b, dot, ' ' + c.label);
}
function StatCard(label, val, sub) {
  var c = dv('card card-sm fade-up');
  var l = dv('card-lbl'); l.textContent = label;
  var v = dv('card-val'); v.textContent = String(val);
  app(c, l, v);
  if (sub) { var s = dv('card-sub'); s.textContent = sub; c.appendChild(s); }
  return c;
}

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
var SC = {
  'checked-in':  { label: 'Checked In',  color: '#10b981', bg: 'rgba(16,185,129,.14)', icon: '●' },
  'checked-out': { label: 'Checked Out', color: '#64748b', bg: 'rgba(100,116,139,.12)', icon: '○' },
  'break':       { label: 'On Break',    color: '#f59e0b', bg: 'rgba(245,158,11,.14)',  icon: '◐' },
  'meeting':     { label: 'In Meeting',  color: '#0ea5e9', bg: 'rgba(14,165,233,.14)',  icon: '◈' },
  'call':        { label: 'On a Call',   color: '#8b5cf6', bg: 'rgba(139,92,246,.14)',  icon: '◉' },
  'focus':       { label: 'Focus Mode',  color: '#d946ef', bg: 'rgba(217,70,239,.14)',  icon: '◎' }
};
var QL = [
  { icon: '💬', label: 'WhatsApp Web',    sub: 'Open messaging',   href: 'https://web.whatsapp.com',    bg: 'rgba(37,211,102,.12)' },
  { icon: '🧩', label: 'Zoho CRM',        sub: 'Customer portal',  href: 'https://crm.zoho.com',        bg: 'rgba(99,102,241,.12)' },
  { icon: '📅', label: 'Google Calendar', sub: 'View schedule',    href: 'https://calendar.google.com', bg: 'rgba(234,67,53,.12)' },
  { icon: '📊', label: 'Google Sheets',   sub: 'Spreadsheets',     href: 'https://sheets.google.com',   bg: 'rgba(14,165,233,.12)' },
  { icon: '🗂️', label: 'Notion',          sub: 'Docs & tasks',     href: 'https://notion.so',           bg: 'rgba(255,255,255,.08)' },
  { icon: '📧', label: 'Gmail',           sub: 'Check inbox',      href: 'https://mail.google.com',     bg: 'rgba(234,67,53,.08)' }
];

// ══════════════════════════════════════════
// TIME HELPERS
// ══════════════════════════════════════════
function nowISO() { return new Date().toISOString(); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fmt(m) {
  if (!m || m <= 0) return '0m';
  var h = Math.floor(m / 60), mn = Math.round(m % 60);
  return h > 0 ? h + 'h ' + mn + 'm' : mn + 'm';
}
function minBetween(a, b) {
  if (!a) return 0;
  return Math.max(0, Math.round(((b ? new Date(b) : new Date()) - new Date(a)) / 60000));
}
function fmtT(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function nowFull() {
  return new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function now5() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// ══════════════════════════════════════════
// DATABASE
// ══════════════════════════════════════════
async function loadToday() {
  if (!sb || !APP.profile) return;
  var r = await sb.from('sessions').select('*')
    .eq('user_id', APP.profile.id).eq('work_date', todayStr())
    .order('started_at', { ascending: true });
  if (r.error) { console.error('loadToday:', r.error); return; }
  APP.timeline = r.data || [];
  APP.currentSession = APP.timeline.find(function(s) { return !s.ended_at; }) || null;
  APP.status = APP.currentSession ? APP.currentSession.type : 'checked-out';
}
async function loadDate(date, uid) {
  if (!sb) return [];
  var r = await sb.from('sessions').select('*')
    .eq('user_id', uid || APP.profile.id).eq('work_date', date)
    .order('started_at', { ascending: true });
  return r.error ? [] : r.data || [];
}
async function loadRange(uid, from, to) {
  if (!sb) return [];
  var r = await sb.from('sessions').select('*')
    .eq('user_id', uid).gte('work_date', from).lte('work_date', to)
    .order('started_at', { ascending: true });
  return r.error ? [] : r.data || [];
}
async function startSess(type) {
  if (!sb || !APP.profile) return null;
  var r = await sb.from('sessions').insert({
    user_id: APP.profile.id, type: type, work_date: todayStr(),
    started_at: nowISO(), ended_at: null, duration_minutes: null
  }).select().single();
  if (r.error) { console.error('startSess:', r.error); return null; }
  return r.data;
}
async function endSess(sess) {
  if (!sb || !sess) return;
  var end = nowISO(), dur = minBetween(sess.started_at, end);
  var r = await sb.from('sessions').update({ ended_at: end, duration_minutes: dur }).eq('id', sess.id);
  if (r.error) console.error('endSess:', r.error);
}
async function loadProfile(uid) {
  if (!sb) return null;
  var r = await sb.from('profiles').select('*').eq('id', uid).single();
  if (r.error) { console.error('loadProfile:', r.error); return null; }
  return r.data;
}
async function loadTeam() {
  if (!sb) return [];
  var r = await sb.from('profiles').select('*');
  if (r.error) return [];
  var today = todayStr(), result = [];
  for (var i = 0; i < r.data.length; i++) {
    var p = r.data[i];
    var sr = await sb.from('sessions').select('*').eq('user_id', p.id).eq('work_date', today).order('started_at', { ascending: true });
    var tl = sr.data || [];
    var open = tl.find(function(s) { return !s.ended_at; });
    var wm = tl.filter(function(s) { return s.ended_at && s.type === 'checked-in'; })
      .reduce(function(a, s) { return a + (s.duration_minutes || 0); }, 0)
      + (open && open.type === 'checked-in' ? minBetween(open.started_at) : 0);
    result.push({ id: p.id, name: p.full_name, avatar: p.avatar_initials, role: p.role, status: open ? open.type : 'checked-out', workMin: wm, sessions: tl.length });
  }
  return result;
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
async function changeStatus(ns) {
  if (APP.saving) return;
  APP.saving = true; render();
  if (APP.currentSession) await endSess(APP.currentSession);
  if (ns !== 'checked-out') await startSess(ns);
  await loadToday();
  APP.saving = false; render();
}
async function doSignIn(email, pass) {
  if (!sb) return { error: { message: 'Database not connected' } };
  var r = await sb.auth.signInWithPassword({ email: email, password: pass });
  return r.error ? { error: r.error } : { user: r.data.user };
}
async function doSignOut() {
  if (!sb) return;
  if (APP.currentSession) await endSess(APP.currentSession);
  await sb.auth.signOut();
  APP.authUser = null; APP.profile = null; APP.status = 'checked-out';
  APP.timeline = []; APP.currentSession = null; APP.page = 'dashboard';
  render();
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
async function boot() {
  document.body.setAttribute('data-theme', APP.theme);
  var msgEl = document.getElementById('load-msg');

  // Create Supabase client
  try {
    sb = window.supabase.createClient(SB_URL, SB_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
    });
    console.log('Supabase client created OK');
  } catch (e) {
    console.error('createClient failed:', e);
    APP.ready = true; APP.showSetup = true; render(); return;
  }

  if (msgEl) msgEl.textContent = 'Checking session…';

  // Check existing session
  try {
    var gs = await sb.auth.getSession();
    console.log('getSession result:', gs);
    var session = gs && gs.data && gs.data.session;
    if (session && session.user) {
      APP.authUser = session.user;
      if (msgEl) msgEl.textContent = 'Loading profile…';
      APP.profile = await loadProfile(session.user.id);
      if (APP.profile) {
        if (msgEl) msgEl.textContent = 'Loading today\'s data…';
        await loadToday();
      }
    }
  } catch (e) {
    console.error('getSession error:', e);
  }

  APP.ready = true;
  render();

  // Listen for auth changes
  sb.auth.onAuthStateChange(async function(event, session) {
    console.log('Auth event:', event);
    if (event === 'SIGNED_IN' && session && session.user) {
      APP.authUser = session.user;
      APP.profile = await loadProfile(session.user.id);
      if (APP.profile) await loadToday();
      render();
    } else if (event === 'SIGNED_OUT') {
      APP.authUser = null; APP.profile = null; APP.status = 'checked-out';
      APP.timeline = []; APP.currentSession = null;
      render();
    }
  });
}

// ══════════════════════════════════════════
// TOTALS
// ══════════════════════════════════════════
function totals(sessions) {
  var w = 0, b = 0, m = 0, c = 0, f = 0;
  sessions.filter(function(s) { return s.ended_at; }).forEach(function(s) {
    var d = s.duration_minutes || 0;
    if (s.type === 'checked-in') w += d;
    if (s.type === 'break') b += d;
    if (s.type === 'meeting') m += d;
    if (s.type === 'call') c += d;
    if (s.type === 'focus') f += d;
  });
  var open = sessions.find(function(s) { return !s.ended_at; });
  if (open) {
    var cur = minBetween(open.started_at);
    if (open.type === 'checked-in') w += cur;
    if (open.type === 'break') b += cur;
    if (open.type === 'meeting') m += cur;
    if (open.type === 'call') c += cur;
    if (open.type === 'focus') f += cur;
  }
  return { work: w, brk: b, meet: m, call: c, focus: f, total: w + b + m + c + f };
}

// ══════════════════════════════════════════
// DONUT
// ══════════════════════════════════════════
function Donut(segs) {
  var r = 40, cx = 50, cy = 50, sw = 14, circ = 2 * Math.PI * r;
  var total = segs.reduce(function(a, s) { return a + s.v; }, 0) || 1;
  var ns = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 100 100'); svg.setAttribute('width', '110'); svg.setAttribute('height', '110');
  function circ_el(attrs) {
    var c = document.createElementNS(ns, 'circle');
    Object.keys(attrs).forEach(function(k) { c.setAttribute(k, attrs[k]); });
    return c;
  }
  svg.appendChild(circ_el({ cx: cx, cy: cy, r: r, fill: 'none', stroke: 'var(--border)', 'stroke-width': sw }));
  svg.appendChild(circ_el({ cx: cx, cy: cy, r: r - sw / 2 - 3, fill: 'var(--bg-card2)' }));
  var off = 0;
  segs.forEach(function(s) {
    if (s.v <= 0) return;
    var dash = (s.v / total) * circ;
    svg.appendChild(circ_el({ cx: cx, cy: cy, r: r, fill: 'none', stroke: s.color, 'stroke-width': sw, 'stroke-dasharray': dash + ' ' + (circ - dash), 'stroke-dashoffset': circ * 0.25 - off, 'stroke-linecap': 'round' }));
    off += dash;
  });
  return svg;
}

// RENDER
// ══════════════════════════════════════════
function render() {
  document.body.setAttribute('data-theme', APP.theme);
  var root = document.getElementById('app');
  root.innerHTML = '';

  if (APP.showSetup) {
    root.appendChild(SetupModal(!!APP.authUser));
    return;
  }
  if (!APP.ready) {
    var ls = dv('loading-screen'); app(ls, dv('spinner'));
    var lm2 = mk('div'); lm2.style.cssText = 'color:var(--text-2);font-size:13px;'; lm2.textContent = 'Connecting…';
    ls.appendChild(lm2); root.appendChild(ls); return;
  }
  if (!APP.authUser || !APP.profile) {
    root.appendChild(AuthView()); return;
  }
  var views = { dashboard: Dashboard, analytics: Analytics, history: History, team: Team, settings: Settings };
  var View = views[APP.page] || Dashboard;
  var appEl = dv('app'); appEl.appendChild(Sidebar());
  var mainEl = dv('main'); mainEl.appendChild(Topbar());
  var content = dv('content'); content.appendChild(View());
  mainEl.appendChild(content); appEl.appendChild(mainEl); root.appendChild(appEl);
}
