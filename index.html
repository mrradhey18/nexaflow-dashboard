<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaFlow Dashboard</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg-app: #0b0d14;
      --bg-card: #111520;
      --bg-card2: #181d2c;
      --bg-glass: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-hi: rgba(99, 102, 241, 0.5);
      --text-1: #eef2ff;
      --text-2: #7c8898;
      --text-3: #3d4659;
      --indigo: #6366f1;
      --indigo-hi: #a5b4fc;
      --indigo-lo: rgba(99, 102, 241, 0.14);
      --emerald: rgba(16, 185, 129, 1);
      --amber: rgba(245, 158, 11, 1);
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --r1: 7px;
      --r2: 13px;
      --trans: 0.17s cubic-bezier(.4, 0, .2, 1);
      --sidebar-w: 215px;
    }

    [data-theme="light"] {
      --bg-app: #f0f4ff;
      --bg-card: #ffffff;
      --bg-card2: #f6f8ff;
      --bg-glass: rgba(0, 0, 0, 0.025);
      --border: rgba(0, 0, 0, 0.09);
      --border-hi: rgba(99, 102, 241, 0.4);
      --text-1: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --indigo-lo: rgba(99, 102, 241, 0.09);
    }

    html,
    body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-app);
      color: var(--text-1)
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width var(--trans);
      overflow: hidden
    }

    .sidebar.collapsed {
      width: 58px
    }

    .sb-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 19px 15px;
      border-bottom: 1px solid var(--border);
      min-height: 64px
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      background: transparent
    }

    .logo-mark img {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 9px;
      display: block
    }

    .logo-text {
      overflow: hidden;
      white-space: nowrap;
      transition: opacity var(--trans)
    }

    .logo-name {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-1)
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-2)
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .nav-lbl,
    .sidebar.collapsed .user-info {
      opacity: 0;
      width: 0;
      pointer-events: none;
      overflow: hidden
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r1);
      cursor: pointer;
      color: var(--text-2);
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
      transition: background var(--trans), color var(--trans)
    }

    .nav-item:hover {
      background: var(--bg-glass);
      color: var(--text-1)
    }

    .nav-item.active {
      background: var(--indigo-lo);
      color: var(--indigo-hi)
    }

    .nav-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 20px;
      text-align: center
    }

    .nav-icon i {
      width: 18px;
      display: inline-block;
      text-align: center
    }

    .sb-bottom {
      padding: 10px 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: var(--r1)
    }

    .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
      flex-shrink: 0
    }

    .av-sm {
      width: 28px;
      height: 28px;
      font-size: 11px
    }

    .av-md {
      width: 38px;
      height: 38px;
      font-size: 14px
    }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap
    }

    .user-role-lbl {
      font-size: 10.5px;
      color: var(--text-2)
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      flex-shrink: 0
    }

    .tb-title {
      font-size: 16px;
      font-weight: 600
    }

    .tb-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 1px
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r1);
      border: 1px solid var(--border);
      background: var(--bg-card2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      font-size: 16px;
      transition: all var(--trans);
      font-family: var(--font);
      flex-shrink: 0;
      position: relative
    }

    .icon-btn:hover {
      color: var(--text-1);
      border-color: var(--border-hi);
      background: var(--indigo-lo)
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 20px;
      overflow: hidden
    }

    .card-sm {
      padding: 16px
    }

    .card-lbl {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      margin-bottom: 5px
    }

    .card-val {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.1
    }

    .card-sub {
      font-size: 11.5px;
      color: var(--text-2);
      margin-top: 4px
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px
    }

    .grid5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 18px
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px
    }

    .grid-main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 18px
    }

    .grid-main-wide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px
    }

    .col-stack {
      display: flex;
      flex-direction: column;
      gap: 18px
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 11px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10.5px;
      font-weight: 500
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: var(--r1);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      border: none;
      font-family: var(--font)
    }

    .btn-primary {
      background: #6366f1;
      color: #fff
    }

    .btn-primary:hover {
      background: #4f46e5
    }

    .btn-outline {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border)
    }

    .btn-outline:hover {
      color: var(--text-1);
      border-color: var(--border-hi);
      background: var(--indigo-lo)
    }

    .btn-danger {
      background: rgba(244, 63, 94, .12);
      color: #fb7185;
      border: 1px solid rgba(244, 63, 94, .25)
    }

    .btn-danger:hover {
      background: rgba(244, 63, 94, .2)
    }

    .btn-success {
      background: rgba(16, 185, 129, .12);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, .25)
    }

    .btn-success:hover {
      background: rgba(16, 185, 129, .2)
    }

    .btn-warning {
      background: rgba(245, 158, 11, .12);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, .25)
    }

    .btn-warning:hover {
      background: rgba(245, 158, 11, .2)
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12.5px
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none
    }

    .sa-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px
    }

    .sec-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .sec-title {
      font-size: 13.5px;
      font-weight: 600
    }

    .tl {
      display: flex;
      flex-direction: column
    }

    .tl-item {
      display: flex;
      gap: 12px;
      padding: 9px 0;
      position: relative
    }

    .tl-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 34px;
      width: 1px;
      height: calc(100% - 12px);
      background: var(--border)
    }

    .tl-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 2px solid
    }

    .donut-wrap {
      display: flex;
      justify-content: center;
      margin: 12px 0
    }

    .ql-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
      width: 100%;
      min-width: 0;
      overflow: hidden
    }

    .ql-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      border-radius: var(--r1);
      border: 1px solid var(--border);
      background: var(--bg-card2);
      cursor: pointer;
      transition: all var(--trans);
      text-decoration: none;
      color: var(--text-1);
      min-width: 0;
      overflow: hidden
    }

    .ql-item:hover {
      border-color: var(--border-hi);
      background: var(--indigo-lo)
    }

    .ql-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--r1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0
    }

    .prog {
      height: 5px;
      border-radius: 100px;
      background: var(--border);
      overflow: hidden;
      margin-top: 4px
    }

    .prog-fill {
      height: 100%;
      border-radius: 100px;
      transition: width .7s ease
    }

    .tbl {
      width: 100%;
      border-collapse: collapse
    }

    .tbl th {
      font-size: 11px;
      color: var(--text-2);
      font-weight: 500;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border)
    }

    .tbl td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px
    }

    .tbl tr:last-child td {
      border-bottom: none
    }

    .input {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--r1);
      padding: 9px 13px;
      font-size: 13.5px;
      color: var(--text-1);
      font-family: var(--font);
      width: 100%;
      outline: none;
      transition: border var(--trans)
    }

    .input:focus {
      border-color: #6366f1
    }

    .input::placeholder {
      color: var(--text-3)
    }

    .field-lbl {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      margin-bottom: 6px;
      display: block
    }

    .field-grp {
      margin-bottom: 15px
    }

    textarea.input {
      resize: vertical;
      min-height: 70px;
      line-height: 1.5
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border)
    }

    .toggle-row:last-child {
      border-bottom: none
    }

    .toggle-info {
      flex: 1;
      min-width: 0
    }

    .toggle-label {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-1)
    }

    .toggle-desc {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.4
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
      margin-left: 16px
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 100px;
      transition: all 0.2s ease
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: var(--text-3);
      border-radius: 50%;
      transition: all 0.2s ease
    }

    .toggle-switch input:checked+.toggle-slider {
      background: rgba(99, 102, 241, 0.2);
      border-color: #6366f1
    }

    .toggle-switch input:checked+.toggle-slider:before {
      transform: translateX(20px);
      background: #6366f1
    }

    .toggle-switch.saving {
      opacity: 0.5;
      pointer-events: none
    }

    /* Work mode banners */
    .workmode-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 7777;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 500;
      animation: slideDownFade 0.35s ease both
    }

    .workmode-banner-off {
      background: linear-gradient(90deg, rgba(244, 63, 94, 0.95), rgba(190, 18, 60, 0.95));
      color: #fff
    }

    .workmode-banner-half {
      background: linear-gradient(90deg, rgba(245, 158, 11, 0.95), rgba(217, 119, 6, 0.95));
      color: #fff
    }

    .workmode-banner-dismiss {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.8;
      font-size: 16px
    }

    .workmode-banner-dismiss:hover {
      opacity: 1
    }

    @keyframes slideDownFade {
      from {
        opacity: 0;
        transform: translateY(-100%)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* AUTH */
    .auth-split {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: row
    }

    .auth-left {
      flex: 1;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center
    }

    .auth-left-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #060b1a 0%, #0d1535 30%, #1a0e3a 60%, #0f0d2e 100%);
      z-index: 0
    }

    .auth-left-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 1
    }

    .auth-left-orb-1 {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.35) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation: orbFloat1 8s ease-in-out infinite
    }

    .auth-left-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      animation: orbFloat2 10s ease-in-out infinite
    }

    .auth-left-orb-3 {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 12s ease-in-out infinite
    }

    .auth-left-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      z-index: 2;
      pointer-events: none
    }

    .auth-left-grid {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
      background-size: 60px 60px
    }

    .auth-left-content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 0 40px 40px 30px
    }

    .auth-left-logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
      animation: slideUpFade 0.7s cubic-bezier(0.22, 1, 0.36, 1) both
    }

    .auth-left-logo-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.5), 0 8px 24px rgba(99, 102, 241, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0
    }

    .auth-left-logo-mark img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 16px;
      display: block
    }

    .auth-left-logo-text {
      text-align: left
    }

    .auth-left-logo-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .auth-left-logo-sub {
      font-size: 10px;
      color: rgba(165, 180, 252, 0.6);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase
    }

    .auth-left-heading {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(160deg, #ffffff 0%, #c7d2fe 50%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: slideUpFade 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both
    }

    .auth-left-sub {
      font-size: 15px;
      color: rgba(165, 180, 252, 0.65);
      line-height: 1.6;
      margin-bottom: 44px;
      animation: slideUpFade 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both
    }

    .auth-float-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideUpFade 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both
    }

    .auth-float-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      text-align: left;
      cursor: default;
      transition: transform 0.25s ease, box-shadow 0.25s ease
    }

    .auth-float-card:hover {
      transform: translateX(6px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.12)
    }

    .auth-float-card:nth-child(1) {
      animation: floatCard1 6s ease-in-out 1s infinite
    }

    .auth-float-card:nth-child(2) {
      animation: floatCard2 7s ease-in-out 1.5s infinite
    }

    .auth-float-card:nth-child(3) {
      animation: floatCard3 8s ease-in-out 2s infinite
    }

    .auth-float-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0
    }

    .auth-float-body {
      flex: 1;
      min-width: 0
    }

    .auth-float-label {
      font-size: 13.5px;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap
    }

    .auth-float-sub {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.75);
      margin-top: 2px
    }

    .auth-float-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0
    }

    .badge-green {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.25)
    }

    .badge-blue {
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.25)
    }

    .badge-amber {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.25)
    }

    .auth-left-brand {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      font-size: 11px;
      color: rgba(99, 102, 241, 0.4);
      letter-spacing: 0.5px
    }

    .auth-right {
      width: 420px;
      min-width: 420px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: #080b14;
      position: relative
    }

    .auth-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(99, 102, 241, 0.06) 0%, transparent 60%);
      pointer-events: none
    }

    .auth-card-glass {
      width: 100%;
      max-width: 400px;
      background: rgba(17, 21, 32, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04), 0 24px 64px rgba(0, 0, 0, 0.5), 0 4px 24px rgba(99, 102, 241, 0.1);
      animation: slideUpFade 0.6s 0.05s cubic-bezier(0.22, 1, 0.36, 1) both
    }

    .auth-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px
    }

    .auth-card-logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0
    }

    .auth-card-logo-mark img {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 10px;
      display: block
    }

    .auth-card-logo-text .auth-card-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .auth-card-logo-text .auth-card-sub-label {
      font-size: 10px;
      color: rgba(99, 102, 241, 0.6);
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase
    }

    .auth-card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #eef2ff;
      margin-bottom: 6px
    }

    .auth-card-subtitle {
      font-size: 13.5px;
      color: var(--text-2);
      margin-bottom: 28px;
      line-height: 1.5
    }

    .auth-input-wrap {
      position: relative;
      margin-bottom: 15px
    }

    .auth-field-lbl {
      font-size: 12px;
      color: rgba(165, 180, 252, 0.8);
      font-weight: 600;
      margin-bottom: 7px;
      display: block;
      letter-spacing: 0.2px
    }

    .auth-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #eef2ff;
      font-family: var(--font);
      width: 100%;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease
    }

    .auth-input::placeholder {
      color: rgba(100, 116, 139, 0.7)
    }

    .auth-input:focus {
      border-color: rgba(99, 102, 241, 0.6);
      background: rgba(99, 102, 241, 0.05);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12), 0 0 20px rgba(99, 102, 241, 0.08)
    }

    .auth-submit-btn {
      width: 100%;
      padding: 13px 20px;
      border-radius: 11px;
      border: none;
      font-family: var(--font);
      font-size: 14.5px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35), 0 1px 0 rgba(255, 255, 255, 0.15) inset;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      letter-spacing: 0.1px
    }

    .auth-submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      opacity: 1;
      transition: opacity 0.2s
    }

    .auth-submit-btn:hover:not(:disabled) {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5), 0 1px 0 rgba(255, 255, 255, 0.2) inset;
      filter: brightness(1.06)
    }

    .auth-submit-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.99)
    }

    .auth-submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none
    }

    .auth-err {
      font-size: 12px;
      color: #fb7185;
      margin-top: 8px;
      min-height: 18px
    }

    .auth-setup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-2)
    }

    .auth-setup-link-a {
      color: var(--indigo-hi);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s
    }

    .auth-setup-link-a:hover {
      color: #c7d2fe
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0
    }

    .auth-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.07)
    }

    .auth-divider-text {
      font-size: 11px;
      color: var(--text-3)
    }

    /* CHECKOUT MODAL */
    .checkout-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .checkout-modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      border-radius: 18px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.1), 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(99, 102, 241, 0.12);
      animation: slideUpFade 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      text-align: center
    }

    .checkout-modal-icon {
      font-size: 44px;
      margin-bottom: 16px;
      display: block
    }

    .checkout-modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 8px;
      letter-spacing: -0.3px
    }

    .checkout-modal-sub {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 28px
    }

    .checkout-modal-btns {
      display: flex;
      gap: 10px;
      justify-content: center
    }

    /* AUTO-LOGOUT BANNER */
    .auto-logout-banner {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 8888;
      background: var(--bg-card);
      border: 1px solid rgba(245, 158, 11, 0.4);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 16px rgba(245, 158, 11, 0.12);
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 280px;
      animation: slideUpFade 0.3s ease both
    }

    .auto-logout-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      flex-shrink: 0;
      animation: livePulse 1.5s ease-in-out infinite
    }

    .auto-logout-text {
      flex: 1;
      font-size: 12.5px;
      color: var(--text-1)
    }

    .auto-logout-timer {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: #fbbf24;
      flex-shrink: 0
    }

    .auto-logout-dismiss {
      font-size: 11px;
      color: var(--indigo-hi);
      cursor: pointer;
      text-decoration: underline;
      margin-top: 4px;
      display: block
    }

    /* LOCAL HISTORY */
    .lh-date-pill {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-card2);
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--trans)
    }

    .lh-date-pill:hover {
      border-color: var(--border-hi);
      color: var(--text-1)
    }

    .lh-date-pill.active {
      background: var(--indigo-lo);
      border-color: var(--border-hi);
      color: var(--indigo-hi)
    }

    .lh-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-2);
      font-size: 13px
    }

    .lh-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin: 16px 0 8px
    }

    .lh-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px
    }

    .lh-item:last-child {
      border-bottom: none
    }

    .lh-badge {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0
    }

    .lh-info {
      flex: 1;
      min-width: 0
    }

    .lh-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .lh-meta {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes orbFloat1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      50% {
        transform: translate(30px, 20px) scale(1.05)
      }
    }

    @keyframes orbFloat2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      50% {
        transform: translate(-25px, -30px) scale(1.08)
      }
    }

    @keyframes orbFloat3 {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1)
      }

      50% {
        transform: translate(-50%, -50%) scale(1.1)
      }
    }

    @keyframes floatCard1 {

      0%,
      100% {
        transform: translateY(0px)
      }

      50% {
        transform: translateY(-4px)
      }
    }

    @keyframes floatCard2 {

      0%,
      100% {
        transform: translateY(0px)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    @keyframes floatCard3 {

      0%,
      100% {
        transform: translateY(0px)
      }

      50% {
        transform: translateY(-3px)
      }
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34d399;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(52, 211, 153, 0.6);
      animation: livePulse 2s ease-in-out infinite
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px rgba(52, 211, 153, 0.6)
      }

      50% {
        opacity: 0.5;
        box-shadow: 0 0 12px rgba(52, 211, 153, 0.9)
      }
    }

    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-app)
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 32px
    }

    .err-msg {
      font-size: 12px;
      color: #fb7185;
      margin-top: 8px;
      min-height: 18px
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--indigo);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 14px;
      background: var(--bg-app)
    }

    .loading-screen .spinner {
      width: 32px;
      height: 32px;
      border-width: 3px
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 28px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto
    }

    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--indigo);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
      flex-shrink: 0
    }

    .sql-block {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--r1);
      padding: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--indigo-hi);
      white-space: pre;
      overflow-x: auto;
      margin-top: 6px;
      line-height: 1.6
    }

    .saved-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      background: rgba(16, 185, 129, .1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, .2);
      opacity: 0;
      transition: opacity .3s
    }

    .saved-pill.show {
      opacity: 1
    }

    .pie-row {
      display: flex;
      align-items: center;
      margin-bottom: 9px;
      font-size: 12.5px
    }

    .pie-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 8px
    }

    .pie-name {
      color: var(--text-2);
      flex: 1
    }

    .pie-val {
      font-weight: 500;
      font-family: var(--mono);
      font-size: 12px
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border)
    }

    .task-item:last-child {
      border-bottom: none
    }

    .task-cb {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all var(--trans);
      background: transparent
    }

    .task-cb.done {
      background: #6366f1;
      border-color: #6366f1
    }

    .task-cb.done::after {
      content: '✓';
      font-size: 10px;
      color: #fff;
      font-weight: 700
    }

    .task-text {
      font-size: 13px;
      flex: 1;
      line-height: 1.4
    }

    .task-text.done {
      text-decoration: line-through;
      color: var(--text-2)
    }

    .task-pri {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 100px
    }

    .task-add {
      display: flex;
      gap: 8px;
      margin-top: 12px
    }

    .sales-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 70px;
      margin: 12px 0 4px
    }

    .sales-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1
    }

    .sales-bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height .5s ease
    }

    .sales-bar-lbl {
      font-size: 9px;
      color: var(--text-2)
    }

    .call-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border)
    }

    .call-item:last-child {
      border-bottom: none
    }

    .call-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0
    }

    .call-info {
      flex: 1;
      min-width: 0
    }

    .call-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .call-meta {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px
    }

    .call-dur {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-2)
    }

    .stabs {
      display: flex;
      gap: 2px;
      background: var(--bg-card2);
      border-radius: var(--r1);
      padding: 3px;
      margin-bottom: 18px
    }

    .stab {
      flex: 1;
      padding: 7px;
      text-align: center;
      font-size: 12.5px;
      font-weight: 500;
      border-radius: 5px;
      cursor: pointer;
      color: var(--text-2);
      transition: all var(--trans);
      border: none;
      background: none;
      font-family: var(--font)
    }

    .stab.active {
      background: var(--bg-card);
      color: var(--text-1);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .2)
    }

    .quote-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(139, 92, 246, 0.08));
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--r2);
      padding: 16px 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px
    }

    .quote-icon {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 2px
    }

    .quote-text {
      font-size: 13.5px;
      color: var(--text-1);
      font-style: italic;
      line-height: 1.6;
      flex: 1
    }

    .quote-author {
      font-size: 11px;
      color: var(--indigo-hi);
      margin-top: 4px;
      font-weight: 500
    }

    .data-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-2);
      font-size: 12px;
      padding: 12px 0
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    .pulse {
      animation: pulse 2s infinite
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fade-up {
      animation: fadeUp .3s ease both
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px
    }

    body.auth-active {
      overflow: hidden
    }

    @media(max-width:900px) {
      .auth-split {
        flex-direction: column;
        overflow-y: auto;
        height: auto;
        min-height: 100vh
      }

      .auth-left {

async function changeStatus(ns) {
  if (APP.saving) return;
  _setLastActivity(Date.now());
  if (ns !== 'checked-out' && ns !== 'break' && APP.workOff) {
    showToast('🚫 Work Off is enabled. Disable it in Settings → Work Mode first.', '#ef4444');
    return;
  }
  APP.saving = true; render();
  try {
    if (APP.currentSession) {
      await Promise.race([
        endSess(APP.currentSession),
        new Promise(function(_, reject) { setTimeout(function() { reject(new Error('timeout')); }, 8000); })
      ]);
      APP.currentSession = null;
    }
    await Promise.race([
      startSess(ns),
      new Promise(function(_, reject) { setTimeout(function() { reject(new Error('timeout')); }, 8000); })
    ]);
    await loadToday();
  } catch(e) {
    console.error('changeStatus error:', e);
    // Reset saving flag immediately so user can retry
    APP.saving = false;
    render();
    showToast('⚠️ Failed — tap to retry', '#ef4444');
    return;
  }
  APP.saving = false;
  _setLastActivity(Date.now());
  renderWorkModeBanners();
  render();
}

    var SQL_BASE = `-- ① PROFILES (includes work mode columns)
create table profiles (
  id uuid references auth.users primary key,
  full_name text not null,
  avatar_initials text default 'U',
  role text default 'Staff',
  work_off boolean default false,
  half_day boolean default false,
  created_at timestamptz default now()
);
alter table profiles enable row level security;
create policy "read"   on profiles for select using (auth.role() = 'authenticated');
create policy "update" on profiles for update using (auth.uid() = id);
create policy "insert" on profiles for insert with check (auth.uid() = id);

-- ② SESSIONS
create table sessions (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references profiles(id) not null,
  type text not null,
  work_date date not null,
  started_at timestamptz not null,
  ended_at timestamptz,
  duration_minutes integer,
  created_at timestamptz default now()
);
alter table sessions enable row level security;
create policy "read"   on sessions for select using (auth.role() = 'authenticated');
create policy "insert" on sessions for insert with check (auth.uid() = user_id);
create policy "update" on sessions for update using (auth.uid() = user_id);
create policy "delete" on sessions for delete using (auth.uid() = user_id);`;

    var SQL_USER_DATA = `-- ③ USER TASKS
create table user_tasks (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references profiles(id) not null,
  text text not null,
  done boolean default false,
  priority text default 'medium',
  work_date date not null,
  created_at timestamptz default now()
);
alter table user_tasks enable row level security;
create policy "read"   on user_tasks for select using (auth.uid() = user_id);
create policy "insert" on user_tasks for insert with check (auth.uid() = user_id);
create policy "update" on user_tasks for update using (auth.uid() = user_id);
create policy "delete" on user_tasks for delete using (auth.uid() = user_id);

-- ④ USER CALLS
create table user_calls (
  id uuid default gen_random_uuid() primary key,

);

    function Donut(segs) {
      var r = 40, cx = 50, cy = 50, sw = 14, circ = 2 * Math.PI * r;
      var total = segs.reduce(function (a, s) { return a + s.v; }, 0) || 1;
      var ns = 'http://www.w3.org/2000/svg', svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100'); svg.setAttribute('width', '110'); svg.setAttribute('height', '110');
      function ce(attrs) { var c = document.createElementNS(ns, 'circle'); Object.keys(attrs).forEach(function (k) { c.setAttribute(k, attrs[k]); }); return c; }
      svg.appendChild(ce({ cx: cx, cy: cy, r: r, fill: 'none', stroke: 'var(--border)', 'stroke-width': sw }));
      svg.appendChild(ce({ cx: cx, cy: cy, r: r - sw / 2 - 3, fill: 'var(--bg-card2)' }));
      var off = 0;
      segs.forEach(function (s) {
        if (s.v <= 0) return;
        var dash = (s.v / total) * circ;
        svg.appendChild(ce({ cx: cx, cy: cy, r: r, fill: 'none', stroke: s.color, 'stroke-width': sw, 'stroke-dasharray': dash + ' ' + (circ - dash), 'stroke-dashoffset': circ * 0.25 - off, 'stroke-linecap': 'round' }));
        off += dash;
      });
      return svg;
    }
